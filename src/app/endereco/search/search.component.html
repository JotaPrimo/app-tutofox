<div class="card mt-2 mb-2 shadow-none p-3 mb-5 bg-light rounded">
  <div class="card-body">
    <form>

      <div class="row">



        <div class="col mb-3">
          <label for="cidade" class="form-label">Busca</label>
          <div class="input-group mb-3">
            <input type="text" class="form-control" #input (keyup)="search(input.value)" placeholder="Logradouro" aria-label="Informe o logradouro, Tipo, Cidade"
              aria-describedby="button-addon2">
            <button class="btn btn-outline-secondary" type="button" id="button-addon2">

              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="feather feather-search">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </button>
          </div>
        </div>       

        <div>
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>

      </div>

    </form>

  </div>
</div>
