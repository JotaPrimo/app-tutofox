<div class="card">

  <div class="card-header">
    Featured
  </div>

  <div class="card-body">

    <div class="d-flex justify-content-between">
      <h4>Form customer</h4>
      <a href="#" routerLink="/person/index" class="btn btn-primary">Back</a>
    </div>

    <hr />

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="row">

        <div class="col-md-4">
          <label for="title">Name:</label>
          <input formControlName="name" id="name" type="text" class="form-control">
          <div class="invalid-feedback" *ngIf="f.name.touched && f.name.invalid">
            <div *ngIf="f.name.errors.required">*Name is required.</div>
            <div *ngIf="f.name.errors.pattern">*The name must only contain letters.</div>
          </div>
        </div>

        <div class="col-md-4">
          <label for="email">Email:</label>
          <input formControlName="email" id="email" type="text" class="form-control">
          <div class="invalid-feedback" *ngIf="f.email.touched && f.email.invalid">
            <div *ngIf="f.email.errors.required">*Email is required.</div>
            <div *ngIf="f.email.errors.email">*The email must be a valid email address.</div>
          </div>
        </div>

        <div class="col-md-4">
          <label for="phone">Phone:</label>
          <input formControlName="phone" id="phone" type="text" class="form-control">
          <div class="invalid-feedback" *ngIf="f.phone.touched && f.phone.invalid">
            <div *ngIf="f.phone.errors.required">*Phone is required.</div>
            <div *ngIf="f.phone.errors.pattern">*The phone must only contain numbers.</div>
          </div>
        </div>
      </div>
      <br>

      <button class="btn btn-primary" [disabled]="!form.valid" type="submit">Submit</button>
    </form>

  </div>
</div>
