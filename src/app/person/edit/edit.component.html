<div class="container">

  <div class="card">
    <div class="card-body shadow">
      <div class="d-flex justify-content-between">
        <h4>Edit person</h4>
        <a href="#" routerLink="/person/index" class="btn btn-primary">Back</a>
      </div>

      <hr>

      <form [formGroup]="form" (ngSubmit)="submit()">


        <div class="form-group row mb-2">
          <div class="col-md-6 ">
            <label for="title">Name:</label>
            <input id="name" formControlName="name" [(ngModel)]="person.name" type="text" class="form-control">
            <div class="alert alert-danger" *ngIf="f.name.invalid && (f.name.touched && f.name.dirty )">
              <div *ngIf="f.name.errors.required">*Name é um campo obrigatório.</div>
              <div *ngIf="f.name.errors.pattern">*The name must only contain letters.</div>
            </div>
          </div>
        </div>

        <div class="form-group row mb-2">
          <div class="col-md-6 ">
            <label for="email">Email:</label>
            <input formControlName="email" [(ngModel)]="person.email" id="email" type="text" class="form-control">
            <div *ngIf="f.email.touched && f.email.invalid" class="alert alert-danger">
              <div *ngIf="f.email.errors.required">*Email is required.</div>
              <div *ngIf="f.email.errors.email">*The email must be a valid email address.</div>
            </div>
          </div>
        </div>

        <div class="form-group row mb-2">
          <div class="col-md-6 ">
            <label for="phone">Phone:</label>
            <input id="phone" formControlName="phone" [(ngModel)]="person.phone" type="text" class="form-control">
            <div class="alert alert-danger" *ngIf="f.phone.touched && f.phone.invalid">
              <div *ngIf="f.phone.errors.required">*Phone is required.</div>
              <div *ngIf="f.phone.errors.pattern">*The phone must only contain numbers.</div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary" type="submit">Update</button>
      </form>
    </div>
  </div>


</div>
